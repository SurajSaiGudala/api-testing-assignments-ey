name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install Newman
      run: npm install -g newman newman-reporter-html

    - name: Run Postman tests
      run: newman run postman-collection-template.json --environment postman-environment.json --iteration-data data.csv --reporters cli,html,json --reporter-html-export report.html --reporter-json-export results.json --insecure

    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          results.json
          report.html
